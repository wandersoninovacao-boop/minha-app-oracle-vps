<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Achadinhos Ofertas Brasil — ofertas selecionadas todo dia das melhores plataformas.">
<title>Achadinhos Ofertas Brasil</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">achadinhos<span>Oficial</span></div>
    <div class="tagline">Ofertas selecionadas todo dia</div>
  </div>
</header>

<section class="hero">
  <h2>🔥 Ofertas que valem a pena</h2>
  <p>Selecionamos os melhores achados para você economizar. Clique e confira!</p>
</section>

<div class="controls">
  <div class="search-wrapper">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar produto..." autocomplete="off" />
  </div>
  <div class="tabs" id="tabsContainer"></div>
</div>

<div class="grid" id="productGrid">
  <div class="loading">Carregando ofertas</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="Fechar">&times;</button>
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-body">
      <div class="modal-platform" id="modalPlatform"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-benefit" id="modalBenefit"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-actions">
        <a class="modal-btn modal-btn-primary" id="modalLink" target="_blank" rel="noopener">Ver oferta</a>
        <button class="modal-btn modal-btn-secondary" id="modalShare">Compartilhar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  Os preços e a disponibilidade dos produtos podem variar. Clique para ver a oferta atualizada.
</footer>

<script>
const PLATFORM_COLORS = {
  "Shopee": "#ee4d2d",
  "Mercado Livre": "#ffe600",
  "Magalu": "#00a1e0",
  "Amazon": "#ff9900",
  "AliExpress": "#e62e04",
  "Temu": "#e60012"
};
const PLATFORM_GRADIENTS = {
  "Shopee": "linear-gradient(135deg, #ee4d2d, #ff7337)",
  "Mercado Livre": "linear-gradient(135deg, #ffe600, #ffb300)",
  "Magalu": "linear-gradient(135deg, #00a1e0, #00c4ff)",
  "Amazon": "linear-gradient(135deg, #ff9900, #ffad33)",
  "AliExpress": "linear-gradient(135deg, #e62e04, #ff4d2d)",
  "Temu": "linear-gradient(135deg, #e60012, #ff3333)"
};

let allProducts = [];
let filteredProducts = [];
let searchTerm = "";
let activePlatform = "";
let searchTimeout = null;

const grid = document.getElementById("productGrid");
const searchInput = document.getElementById("searchInput");
const tabsContainer = document.getElementById("tabsContainer");
const modalOverlay = document.getElementById("modalOverlay");
const modalClose = document.getElementById("modalClose");
const modalImg = document.getElementById("modalImg");
const modalPlatform = document.getElementById("modalPlatform");
const modalName = document.getElementById("modalName");
const modalBenefit = document.getElementById("modalBenefit");
const modalPrice = document.getElementById("modalPrice");
const modalLink = document.getElementById("modalLink");
const modalShare = document.getElementById("modalShare");
const toast = document.getElementById("toast");

async function loadProducts() {
  try {
    const res = await fetch("/api/products");
    const data = await res.json();
    allProducts = data.products || [];
    if (allProducts.length > 0) {
      document.querySelector(".hero h2").textContent = "\u{1F525} " + (data.settings?.brandName || "Achadinhos Ofertas Brasil");
    }
    renderTabs();
    renderGrid();
  } catch (err) {
    grid.innerHTML = '<div class="empty">Erro ao carregar ofertas. Tente novamente.</div>';
  }
}

function renderTabs() {
  const seen = new Set();
  tabsContainer.innerHTML = '<button class="tab-btn active" data-platform="">Todos</button>';
  tabsContainer.firstChild.addEventListener("click", () => setPlatform(""));
  for (const p of allProducts) {
    if (p.platform && !seen.has(p.platform)) {
      seen.add(p.platform);
      const btn = document.createElement("button");
      btn.className = "tab-btn";
      btn.dataset.platform = p.platform;
      btn.textContent = p.platform;
      btn.addEventListener("click", () => setPlatform(p.platform));
      tabsContainer.appendChild(btn);
    }
  }
}

function setPlatform(platform) {
  activePlatform = platform;
  tabsContainer.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.platform === platform);
  });
  renderGrid();
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchTerm = searchInput.value;
    renderGrid();
  }, 250);
}

searchInput.addEventListener("input", debounceSearch);

function formatPrice(price) {
  if (!price) return null;
  const cleaned = price.replace(/[^0-9,.]/g, "");
  if (!cleaned) return null;
  const num = parseFloat(cleaned.replace(",", "."));
  if (isNaN(num)) return price;
  return num.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function getInitials(name) {
  if (!name) return "?";
  return name.charAt(0).toUpperCase();
}

function renderGrid() {
  filteredProducts = allProducts.slice();
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filteredProducts = filteredProducts.filter((p) => p.name && p.name.toLowerCase().includes(term));
  }
  if (activePlatform) {
    filteredProducts = filteredProducts.filter((p) => p.platform === activePlatform);
  }
  filteredProducts.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

  if (filteredProducts.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhuma oferta encontrada.</div>';
    return;
  }

  grid.innerHTML = filteredProducts.map((p, i) => {
    const color = PLATFORM_COLORS[p.platform] || "#6b7280";
    const gradient = PLATFORM_GRADIENTS[p.platform] || "linear-gradient(135deg, #e5e7eb, #d1d5db)";
    const fmtPrice = formatPrice(p.price);

    return `<div class="card" data-index="${i}">
      ${p.image
        ? `<img class="card-img" src="${p.image}" alt="${p.name || "Produto"}" loading="lazy" onerror="this.style.display='none'"/>`
        : `<div class="card-img-placeholder" style="background:${gradient}">${getInitials(p.name)}</div>`}
      <div class="card-body">
        <div class="card-platform" style="color:${color}">${p.platform || ""}</div>
        <div class="card-name">${p.name || "Produto"}</div>
        ${fmtPrice ? `<div class="card-price">${fmtPrice}</div>` : ""}
        <button class="card-btn">Ver oferta</button>
      </div>
    </div>`;
  }).join("");
}

grid.addEventListener("click", (e) => {
  const card = e.target.closest(".card");
  if (!card) return;
  const idx = parseInt(card.dataset.index, 10);
  const p = filteredProducts[idx];
  if (p) openModal(p);
});

function openModal(p) {
  const color = PLATFORM_COLORS[p.platform] || "#6b7280";
  const fmtPrice = formatPrice(p.price);

  if (p.image) {
    modalImg.src = p.image;
    modalImg.style.display = "block";
    modalImg.onerror = function() {
      this.style.display = "none";
    };
  } else {
    modalImg.style.display = "none";
  }
  modalPlatform.textContent = p.platform || "";
  modalPlatform.style.color = color;
  modalName.textContent = p.name || "Produto";
  modalBenefit.textContent = p.benefit || "";
  modalBenefit.style.display = p.benefit ? "block" : "none";
  modalPrice.textContent = fmtPrice || "";
  modalPrice.style.display = fmtPrice ? "block" : "none";
  modalLink.href = p.affiliateLink || "#";

  modalShare.dataset.link = p.affiliateLink || window.location.href;
  modalOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modalOverlay.classList.remove("open");
  document.body.style.overflow = "";
}

modalClose.addEventListener("click", closeModal);
modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

modalShare.addEventListener("click", async () => {
  const link = modalShare.dataset.link;
  try {
    await navigator.clipboard.writeText(link);
    showToast("Link copiado!");
  } catch {
    const textarea = document.createElement("textarea");
    textarea.value = link;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
    showToast("Link copiado!");
  }
});

let toastTimeout = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove("show"), 2000);
}

loadProducts();
</script>
</body>
</html>
