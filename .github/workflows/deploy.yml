name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/app"
          echo "IMAGE_NAME=$image_name" >> "$GITHUB_ENV"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --tag "$IMAGE_NAME:latest" \
            --tag "$IMAGE_NAME:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ github.sha }}"

      - name: Deploy on Oracle VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Write Caddyfile with admin auth + DuckDNS + HTTPS auto
            cat > /opt/minha-app/Caddyfile <<'CADDY'
            achadinhos.duckdns.org {
                handle /admin/* {
                    basicauth {
                        ${{ secrets.CADDY_ADMIN_USER }} ${{ secrets.CADDY_ADMIN_PASSWORD_HASH }}
                    }
                    reverse_proxy app:3000
                }

                handle /api/products {
                    reverse_proxy app:3000
                }

                handle /health {
                    reverse_proxy app:3000
                }

                handle /* {
                    reverse_proxy app:3000
                }
            }
            CADDY

            # Write docker-compose with admin auth vars
            cat > /opt/minha-app/docker-compose.yml <<'COMPOSE'
            services:
              app:
                image: ${{ steps.image.outputs.name }}:latest
                ports:
                  - "127.0.0.1:3000:3000"
                restart: unless-stopped
                environment:
                  - PORT=3000
                  - SHOPEE_TELEGRAM_BOT_TOKEN=${SHOPEE_TELEGRAM_BOT_TOKEN}
                  - SHOPEE_TELEGRAM_CHAT_ID=${SHOPEE_TELEGRAM_CHAT_ID}
                volumes:
                  - app_data:/app/data
                networks:
                  - caddy

              caddy:
                image: caddy:alpine
                ports:
                  - "80:80"
                  - "443:443"
                restart: unless-stopped
                volumes:
                  - /opt/minha-app/Caddyfile:/etc/caddy/Caddyfile
                  - caddy_data:/data
                  - caddy_config:/config
                networks:
                  - caddy

            volumes:
              app_data:
              caddy_data:
              caddy_config:

            networks:
              caddy:
                driver: bridge
            COMPOSE

            # Write .env with secrets
            cat > /opt/minha-app/.env <<'ENV'
            APP_IMAGE=${{ steps.image.outputs.name }}:latest
            SHOPEE_TELEGRAM_BOT_TOKEN=${{ secrets.SHOPEE_TELEGRAM_BOT_TOKEN }}
            SHOPEE_TELEGRAM_CHAT_ID=${{ secrets.SHOPEE_TELEGRAM_CHAT_ID }}
            ENV

            cd /opt/minha-app
            echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            # Diagnostic: check if Caddy is listening on 443 inside the VPS
            echo "=== CHECKING PORTS ==="
            sudo ss -tlnp | grep -E ':(80|443)\b' || echo "Ports 80/443 not found listening"
            echo "=== CADDY LOGS ==="
            docker compose logs caddy --tail=20
            echo "=== CADDY PS ==="
            docker compose ps

            # Ensure local iptables allows 80 and 443
            sudo iptables -C INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 443 -j ACCEPT
            sudo iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT

            for i in $(seq 1 24); do
              if curl -fsS --max-time 5 http://achadinhos.duckdns.org/health; then
                echo "Healthcheck OK"
                exit 0
              fi
              echo "Aguardando healthcheck... tentativa $i/24"
              sleep 5
            done
            echo "=== FINAL STATE ==="
            docker compose ps
            docker compose logs --tail=120
            exit 1
